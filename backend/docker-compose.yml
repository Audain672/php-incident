version: '3.9'

services:

  nginx:
    image: nginx:1.25-alpine
    container_name: incident_nginx
    ports:
      - "8080:80"
    volumes:
      - ./public:/var/www/html/public:ro
      - ./storage:/var/www/html/storage
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - php
    networks:
      - incident_net

  php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: incident_php
    volumes:
      - .:/var/www/html
      - ./storage/uploads:/var/www/html/storage/uploads
    environment:
      - PHP_IDE_CONFIG=serverName=Docker
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - incident_net

  mysql:
    image: mysql:8.0
    container_name: incident_mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/00_init.sql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/schema.sql
      - ./database/seed.sql:/docker-entrypoint-initdb.d/seed.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - incident_net

  redis:
    image: redis:7-alpine
    container_name: incident_redis
    command: redis-server --requirepass ${REDIS_PASSWORD}
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      retries: 3
    networks:
      - incident_net

volumes:
  mysql_data:
  redis_data:

networks:
  incident_net:
    driver: bridge
